mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
external-controller: 0.0.0.0:9090
external-ui: /etc/mihomo/ui
secret: ""

profile:
  store-selected: true
  store-fake-ip: true

tun:
  enable: true
  stack: system
  device: mihomo
  auto-route: true
  strict-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 223.5.5.5
    - 114.114.114.114
  nameserver:
    - https://dns.alidns.com/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN

proxy-providers:
  nanobot_sub:
    type: http
    url: "https://proxyinfo.net/api/v1/client/subscribe?token=799a33effeabd4efd124fd786caa672e"
    interval: 3600
    path: ./providers/nanobot_sub.yaml
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204

proxies: []
proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - DIRECT
    use:
      - nanobot_sub

rules:
  - GEOIP,CN,DIRECT
  - MATCH,PROXY
