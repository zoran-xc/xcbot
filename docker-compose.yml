x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ./deploy/xcbot:/root/.xcbot

services:
  xcbot-gateway:
    container_name: xcbot-gateway
    <<: *common-config
    command: ["gateway"]
    restart: unless-stopped
    network_mode: host
    shm_size: "2gb"
    environment:
      - HTTP_PROXY=http://127.0.0.1:7890
      - HTTPS_PROXY=http://127.0.0.1:7890
      - ALL_PROXY=http://127.0.0.1:7890
      - NO_PROXY=localhost,127.0.0.1,open.feishu.cn,*.feishu.cn,*.larkoffice.com
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
  
  xcbot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true
